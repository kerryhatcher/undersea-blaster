name: Release AppImage

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build AppImage
        env:
          ELECTRON_BUILDER_PUBLISH: never
          BASE_PATH: ./
        run: npm run -s dist:appimage

      - name: Prepare latest alias
        run: |
          set -euo pipefail
          appimage=$(ls -1 dist-app/*.AppImage | head -n1)
          base=$(basename "$appimage")
          arch=$(echo "$base" | sed -E 's/.*-([^-]+)\.(AppImage)$/\1/')
          latest_name="undersea-blaster-latest-${arch}.AppImage"
          cp -f "$appimage" "dist-app/${latest_name}"

      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-app/*.AppImage
            dist-app/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

