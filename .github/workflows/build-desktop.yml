name: Build Desktop App

on:
  push:
    branches: [ main, feature-desktop-app ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release build'
        required: false
        default: 'false'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            artifact: windows
          - os: macos-latest
            platform: darwin
            arch: x64
            artifact: macos
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact: linux

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Cache Electron
      uses: actions/cache@v3
      with:
        path: |
          ~/Library/Caches/electron
          ~/.cache/electron
          ~/.cache/electron-builder
          ~/AppData/Local/electron/Cache
          ~/AppData/Roaming/electron
        key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-electron-

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test
      continue-on-error: true

    - name: Build web app
      run: npm run build

    - name: Rebuild native modules
      run: npm run rebuild:electron
      env:
        ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

    - name: Build Electron app (Windows)
      if: matrix.os == 'windows-latest'
      run: npm run build:win
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

    - name: Build Electron app (macOS)
      if: matrix.os == 'macos-latest'
      run: npm run build:mac
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
        CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}

    - name: Build Electron app (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: npm run build:linux
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact }}-build
        path: |
          dist/*.exe
          dist/*.msi
          dist/*.dmg
          dist/*.pkg
          dist/*.AppImage
          dist/*.deb
          dist/*.rpm
          dist/*.snap
        retention-days: 7

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'
      uses: softprops/action-gh-release@v1
      with:
        draft: true
        prerelease: false
        files: |
          dist/*.exe
          dist/*.msi
          dist/*.dmg
          dist/*.pkg
          dist/*.AppImage
          dist/*.deb
          dist/*.rpm
          dist/*.snap
        body: |
          ## Undersea Blaster Desktop
          
          ### What's New
          - Performance optimizations
          - Enhanced data persistence
          - Professional menu system
          - Auto-updater support
          
          ### Installation
          - **Windows**: Download and run the `.exe` installer
          - **macOS**: Download and open the `.dmg` file
          - **Linux**: Download the `.AppImage` and make it executable
          
          ### System Requirements
          - Windows 10 or later (64-bit)
          - macOS 10.14 or later
          - Linux: Ubuntu 18.04+ or equivalent
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-matrix:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Check matrix completion
      run: echo "All platform builds completed successfully"

  code-signing:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Verify code signing
      run: |
        echo "Code signing verification would run here"
        echo "Checking Windows signatures..."
        echo "Checking macOS notarization..."
        echo "Checking Linux packages..."

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, code-signing]
    runs-on: ubuntu-latest
    steps:
    - name: Publish to update server
      run: |
        echo "Publishing release to auto-update server"
        echo "Version: ${{ github.ref_name }}"